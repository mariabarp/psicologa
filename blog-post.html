<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post | Maria Eduarda Barp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="container navbar">
        <a class="logo" href="index.html">
          <img src="assets/logo certea.png" alt="Logo de Maria Eduarda Barp" />
        </a>
      </nav>
    </header>

    <main class="section container" id="blog-post-detail">
      <article class="blog-detail-card">
        <img id="post-image" src="assets/capa1.png" alt="Capa do post" />
        <div class="blog-detail-content">
          <time id="post-date"></time>
          <h1 id="post-title"></h1>
          <div id="post-text"></div>
          <a class="btn btn-secondary" href="index.html#blog">Voltar ao blog</a>
        </div>
      </article>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <div>
          <p>© <span id="year"></span> Maria Eduarda Barp. Psicóloga Clínica.</p>
          <p class="footer-note">Atendimento online • CRP 12/30125</p>
        </div>
        <div class="footer-links">
          <a href="https://www.instagram.com/psimariabarp" target="_blank" rel="noreferrer">@psimariabarp</a>
          <a href="index.html#top">Voltar ao topo</a>
        </div>
      </div>
    </footer>

    <script src="blog-post.js"></script>
  </body>
</html>
